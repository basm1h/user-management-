<!DOCTYPE html>
<html>
<head>
    <title>Update User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f3f4f9;">

<div class="container mt-5">

    <div class="card p-4">
        <h3>Edit User</h3>

        <form method="POST">

            <input class="form-control mb-3" name="first_name" value="{{ user[1] }}" required>
            <input class="form-control mb-3" name="last_name" value="{{ user[2] }}" required>

            <select class="form-select mb-3" name="gender">
                <option value="Male" {% if user[3]=='Male' %}selected{% endif %}>Man</option>
                <option value="Female" {% if user[3]=='Female' %}selected{% endif %}>Woman</option>
            </select>

            <input class="form-control mb-3" name="phone" value="{{ user[4] }}">
            <input class="form-control mb-3" name="email" value="{{ user[5] }}">

            <button class="btn btn-success w-100">Update</button>
        </form>

        <a href="/" class="btn btn-secondary mt-3">Back</a>

    </div>

</div>

</body>
</html>
