<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>

    <style>
        body {
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .nav {
            text-align: center;
            margin-top: 20px;
        }

        .nav a {
            margin: 10px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Orders (JOIN RESULT)</h2>

    {% if orders %}
        <table>
            <tr>
                <th>Customer Name</th>
                <th>Product Name</th>
                <th>Quantity</th>
            </tr>

            {% for o in orders %}
            <tr>
                <td>{{ o[0] }}</td>
                <td>{{ o[1] }}</td>
                <td>{{ o[2] }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p style="text-align:center;">No orders yet</p>
    {% endif %}

    <div class="nav">
        <a href="/">Users</a> |
        <a href="/products">Products</a>
    </div>

</div>

</body>
</html>
